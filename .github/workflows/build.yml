name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project archive
      run: |
        unzip *.zip
        echo "=== СТРУКТУРА ПАПОК ПОСЛЕ РАСПАКОВКИ ==="
        find . -maxdepth 3 -not -path '*/.*'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # УНИВЕРСАЛЬНЫЙ ШАГ: Сам находит gradlew, дает права и запускает сборку
    - name: Find and Build with Gradle
      run: |
        # Ищем, в какой папке лежит gradlew
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "ОШИБКА: Файл gradlew не найден ни в одной папке архива!"
          exit 1
        fi
        
        # Получаем чистый путь к папке, где лежит gradlew
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        echo "Проект найден в папке: $PROJECT_DIR"
        
        # Даем права и собираем
        chmod +x "$PROJECT_DIR/gradlew"
        cd "$PROJECT_DIR"
        ./gradlew build --no-daemon

    - name: Upload Mod Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Mod
        # Ищет готовый .jar в любой папке build/libs, которая создалась
        path: "**/build/libs/*.jar"
        
